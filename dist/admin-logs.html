<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity Logs — SecureCBT</title>
  <meta name="description" content="View and manage administrative activity logs for SecureCBT."/>
  <link rel="stylesheet" crossorigin href="/assets/main-CCBJMKLo.css">
  <link rel="stylesheet" crossorigin href="/assets/admin-vGVxAY1I.css">
</head>
<body class="admin-body">
<div class="admin-layout">
<div class="admin-container">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-left">
      <button class="back-btn" onclick="window.location.href='admin-dashboard.html'">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Dashboard
      </button>
      <div>
        <div class="page-title">Activity Logs</div>
        <div class="page-subtitle" id="logCountLabel">0 logs registered</div>
      </div>
    </div>
    <div class="page-actions">
      <button class="btn btn-outline btn-sm" onclick="exportLogsCSV()">⬇️ Export CSV</button>
      <button class="btn btn-danger btn-sm" onclick="clearLogs()">🗑️ Clear Logs</button>
    </div>
  </div>

  <!-- FILTER & SEARCH -->
  <div class="card" style="margin-bottom:20px;padding:16px;">
    <div class="filter-bar" style="margin-bottom:0;">
      <div class="search-wrap" style="flex:1;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="logSearchInput" placeholder="Search logs by action detail..." oninput="renderLogs()"/>
      </div>
      <select class="filter-select" id="logCategoryFilter" onchange="renderLogs()" style="min-width:150px;">
        <option value="">All Categories</option>
        <option value="system">⚙️ System</option>
        <option value="students">👥 Students</option>
        <option value="questions">❓ Questions</option>
        <option value="results">📊 Results</option>
        <option value="attendance">📅 Attendance</option>
      </select>
    </div>
  </div>

  <!-- TIMELINE LOGS TABLE -->
  <div class="card" style="padding:0;overflow:hidden;">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:180px;">Timestamp</th>
            <th style="width:120px;">Category</th>
            <th style="width:200px;">User</th>
            <th>Action Description</th>
          </tr>
        </thead>
        <tbody id="logsTableBody">
          <tr><td colspan="4"><div class="empty-state"><p>No activity logs found.</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/supabase-config.js"></script><script src="js/db.js"></script>
<script src="js/config.js"></script>
<script src="js/admin-sidebar.js"></script>
<script src="js/admin-logs.js"></script>
</body>
</html>
