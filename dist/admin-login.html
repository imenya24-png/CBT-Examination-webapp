<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — SecureCBT</title>
  <meta name="description" content="Administrator access portal for SecureCBT examination system."/>
  <link rel="stylesheet" crossorigin href="/assets/main-CCBJMKLo.css">
  <link rel="stylesheet" crossorigin href="/assets/admin-vGVxAY1I.css">
</head>
<body class="login-body">
  <a href="index.html" class="login-back">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Home
  </a>

  <div class="login-card">
    <div class="login-icon">🛡️</div>
    <h1 class="login-title">Administrator Access</h1>
    <p class="login-subtitle">Restricted area. Authorized personnel only.</p>

    <div class="login-error" id="loginError">Invalid credentials. Please try again.</div>

    <div class="login-field">
      <label class="login-label" for="adminEmail">Admin Email</label>
      <div class="login-input-wrap">
        <span class="login-input-icon">✉️</span>
        <input class="login-input" type="email" id="adminEmail" placeholder="admin@cbt.com" value="admin@cbt.com" autocomplete="email"/>
      </div>
    </div>

    <div class="login-field">
      <label class="login-label" for="adminPass">Password</label>
      <div class="login-input-wrap">
        <span class="login-input-icon">🔒</span>
        <input class="login-input" type="password" id="adminPass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      Access Dashboard
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/supabase-config.js"></script><script src="js/db.js"></script>
  <script src="js/config.js"></script>
  <script src="js/admin-auth.js"></script>
</body>
</html>
