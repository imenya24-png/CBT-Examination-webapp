<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Examination — SecureCBT</title>
  <link rel="stylesheet" crossorigin href="/assets/main-CCBJMKLo.css">
  <link rel="stylesheet" crossorigin href="/assets/admin-vGVxAY1I.css">
</head>
<body class="exam-body">

  <!-- VIOLATION OVERLAY -->
  <div id="violationOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
    <div style="background:#1e293b;border:2px solid #dc2626;border-radius:20px;padding:40px;text-align:center;max-width:420px;width:90%;">
      <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
      <div style="font-size:20px;font-weight:800;color:#fff;margin-bottom:8px;" id="violationTitle">Violation Detected</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:8px;" id="violationMsg">You switched tabs or left the exam window.</div>
      <div style="font-size:13px;color:#fca5a5;margin-bottom:20px;" id="violationCount"></div>
      <button onclick="dismissViolation()" style="background:linear-gradient(135deg,#dc2626,#ea580c);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">
        Return to Exam
      </button>
    </div>
  </div>

  <!-- SUBMIT CONFIRM OVERLAY -->
  <div id="submitOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:20px;padding:36px;max-width:440px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <div style="font-size:40px;margin-bottom:14px;">📋</div>
      <h2 style="font-size:20px;font-weight:800;margin-bottom:8px;color:#111827;">Submit Examination?</h2>
      <p style="font-size:14px;color:#6b7280;margin-bottom:6px;" id="submitSummary"></p>
      <p style="font-size:13px;color:#9ca3af;margin-bottom:24px;">This action cannot be undone.</p>
      <div style="display:flex;gap:12px;">
        <button onclick="hideSubmitConfirm()" style="flex:1;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;font-weight:600;background:#fff;cursor:pointer;">Cancel</button>
        <button onclick="confirmSubmit()" style="flex:1;padding:12px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">Submit Now</button>
      </div>
    </div>
  </div>

  <!-- EXAM HEADER -->
  <header class="exam-header" id="examHeader">
    <div class="exam-title" id="examTitleEl">Python Basic Fundamental</div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div style="font-size:13px;color:rgba(255,255,255,0.5);" id="studentNameEl"></div>
      <div class="exam-timer" id="timerEl">30:00</div>
    </div>
  </header>
  <div class="exam-progress-bar"><div class="exam-progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- EXAM BODY -->
  <div class="exam-body-wrap">

    <!-- Question Card -->
    <div class="question-card" id="questionCard">
      <div class="question-header">
        <span class="question-counter" id="questionCounter">Question 1 of 30</span>
        <span class="question-type-badge mcq" id="questionTypeBadge">MCQ</span>
      </div>
      <div class="question-text-main" id="questionText"></div>
      <div id="questionOptions"></div>
    </div>

    <!-- Navigation -->
    <div class="exam-nav">
      <button class="btn btn-outline" id="prevBtn" onclick="navigate(-1)" style="color:#fff;border-color:rgba(255,255,255,0.2);background:transparent;" disabled>
        ← Previous
      </button>
      <div style="display:flex;gap:10px;">
        <button class="btn" onclick="showSubmitConfirm()" style="background:rgba(255,255,255,0.1);color:#fff;border:1.5px solid rgba(255,255,255,0.2);">
          📋 Review &amp; Submit
        </button>
      </div>
      <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)">
        Next →
      </button>
    </div>

    <!-- Question Grid -->
    <div class="question-grid" id="questionGrid"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/supabase-config.js"></script><script src="js/db.js"></script>
  <script src="js/config.js"></script>
  <script src="js/exam.js"></script>
</body>
</html>
